<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Annotated playbill clue</title>
  <desc id="desc">A simple playbill-style clue image for The Last Curtain.</desc>
  <rect width="960" height="540" fill="#111827"/>
  <rect x="250" y="54" width="460" height="432" rx="12" fill="#f8fafc"/>
  <text x="480" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#111827">THE LAST CURTAIN</text>
  <text x="480" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">Opening Night Playbill</text>
  <line x1="304" y1="182" x2="656" y2="182" stroke="#cbd5e1" stroke-width="2"/>
  <text x="324" y="232" font-family="Arial, sans-serif" font-size="24" fill="#111827">Vivian Vale</text>
  <text x="324" y="282" font-family="Arial, sans-serif" font-size="24" fill="#111827">Dorian Cross</text>
  <text x="324" y="332" font-family="Arial, sans-serif" font-size="24" fill="#111827">Mara Finch</text>
  <text x="324" y="382" font-family="Arial, sans-serif" font-size="24" fill="#111827">Elliot Voss</text>
  <ellipse cx="392" cy="374" rx="104" ry="28" fill="none" stroke="#dc2626" stroke-width="6"/>
  <path d="M602 216c-42 72-52 128-30 168" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  <text x="570" y="424" font-family="Georgia, serif" font-size="20" fill="#dc2626">settle everything</text>
