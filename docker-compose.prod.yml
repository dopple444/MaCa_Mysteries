services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maca_mysteries}
      POSTGRES_USER: ${POSTGRES_USER:-maca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_production}
    volumes:
      - maca_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-maca}:${POSTGRES_PASSWORD:-change_me_before_production}@db:5432/${POSTGRES_DB:-maca_mysteries}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3001}:3000"

volumes:
  maca_postgres_data:
