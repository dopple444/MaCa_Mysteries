services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maca_mysteries}
      POSTGRES_USER: ${POSTGRES_USER:-maca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_production}
    volumes:
      - maca_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-maca}:${POSTGRES_PASSWORD:-change_me_before_production}@db:5432/${POSTGRES_DB:-maca_mysteries}
      APP_URL: ${APP_URL:-http://localhost:3001}
      CSRF_SECRET: ${CSRF_SECRET:-change_me_before_production}
      ACCOUNT_TOKEN_SECRET: ${ACCOUNT_TOKEN_SECRET:-change_me_before_production}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${APP_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  maca_postgres_data:
